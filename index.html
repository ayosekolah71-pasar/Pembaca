<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>DocuMind Vault - HD Reader</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e4a6e">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        :root { --primary: #1e4a6e; --bg: #eef2f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* App Bar */
        .app-bar {
            background: white; padding: 10px 20px; display: flex; align-items: center; 
            justify-content: space-between; gap: 10px; z-index: 100; border-bottom: 1px solid #ddd;
        }
        
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon img { width: 32px; height: 32px; border-radius: 8px; }
        .logo-text { font-weight: 800; font-size: 1.2rem; color: var(--primary); }

        .search-box {
            flex: 1; max-width: 400px; display: flex; align-items: center; 
            background: #f0f2f5; padding: 8px 12px; border-radius: 50px; border: 1px solid #ccc;
        }
        .search-box input { flex: 1; border: none; background: transparent; outline: none; font-size: 16px; }

        /* Viewer Container */
        #viewerArea {
            flex: 1; overflow: auto; padding: 20px; display: flex; 
            flex-direction: column; align-items: center; background: #525659;
        }

        .page-container {
            position: relative; background: white; margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); max-width: 100%;
        }
        
        canvas { display: block; max-width: 100%; height: auto; }

        /* DOCX Content Style */
        .doc-content {
            background: white; padding: 40px; max-width: 800px; width: 100%;
            border-radius: 8px; line-height: 1.6;
        }

        /* Loading Overlay */
        #loadingOverlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Floating Button */
        .fab {
            position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px;
            background: var(--primary); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: none; cursor: pointer;
        }

        mark.highlight { background: yellow; color: black; }
        mark.highlight.active { background: orange; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-weight:600;">Sedang Menajamkan Dokumen...</p>
</div>

<header class="app-bar">
    <div class="logo-area">
        <div class="logo-icon"><img src="109631.png" alt="Logo"></div>
        <div class="logo-text">DocuMind</div>
    </div>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari kata...">
        <span id="matchStatus" style="font-size:12px; margin-left:5px;">0/0</span>
    </div>
</header>

<main id="viewerArea">
    <div style="color:white; text-align:center; margin-top:100px; opacity:0.5;">
        <i class="fas fa-file-upload fa-4x"></i>
        <p>Klik tombol + untuk buka file PDF/DOCX</p>
    </div>
</main>

<button class="fab" onclick="document.getElementById('fileInput').click()"><i class="fas fa-plus"></i></button>
<input type="file" id="fileInput" hidden accept=".pdf,.docx">

<script>
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const viewer = document.getElementById('viewerArea');
    const loader = document.getElementById('loadingOverlay');

    async function processFile(file) {
        loader.style.display = 'flex';
        viewer.innerHTML = '';
        
        try {
            const arrayBuffer = await file.arrayBuffer();
            
            if (file.name.toLowerCase().endsWith('.pdf')) {
                const pdf = await pdfjs.getDocument({data: arrayBuffer}).promise;
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    // Gunakan skala 2.0 untuk HD (Anti-Buram)
                    const viewport = page.getViewport({scale: 2.0});
                    
                    const container = document.createElement('div');
                    container.className = 'page-container';
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    container.appendChild(canvas);
                    viewer.appendChild(container);
                    
                    await page.render({canvasContext: context, viewport}).promise;
                }
            } else if (file.name.toLowerCase().endsWith('.docx')) {
                const result = await mammoth.convertToHtml({arrayBuffer});
                viewer.innerHTML = `<div class="doc-content">${result.value}</div>`;
            }
        } catch (err) {
            alert("Gagal memuat file: " + err.message);
        } finally {
            loader.style.display = 'none';
        }
    }

    document.getElementById('fileInput').onchange = (e) => {
        if (e.target.files[0]) processFile(e.target.files[0]);
    };

    // Fitur PWA Register
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
