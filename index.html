<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DocuMind Vault - Reader Offline</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e4a6e">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/281/281760.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: #1e293b; }

        /* App Bar */
        .app-bar {
            background: white; border-bottom: 1px solid #e2e8f0; padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between; gap: 15px; z-index: 50;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon { background: #1e4a6e; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .logo-text { font-weight: 800; font-size: 1.2rem; color: #0f172a; }

        /* Search Section */
        .search-section { flex: 1; max-width: 500px; display: flex; align-items: center; gap: 8px; background: #f8fafc; padding: 6px 12px; border-radius: 12px; border: 1px solid #cbd5e1; }
        .search-section input { flex: 1; border: none; background: transparent; outline: none; font-size: 0.9rem; }
        .match-badge { font-size: 0.75rem; font-weight: 700; color: #1e4a6e; padding: 2px 8px; background: #dbeafe; border-radius: 20px; }

        /* Layout */
        .main-content { flex: 1; display: flex; overflow: hidden; }
        
        .sidebar { width: 280px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; }
        
        .file-list { flex: 1; overflow-y: auto; padding: 12px; }
        .file-item { 
            padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; 
            display: flex; align-items: center; justify-content: space-between; transition: 0.2s;
        }
        .file-item.active { background: #eff6ff; border-color: #bfdbfe; }

        /* Viewer - Perbaikan tampilan utuh */
        .viewer-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; background: #cbd5e1; }
        
        .pdf-page-wrapper { 
            background: white; 
            position: relative; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            line-height: 0; /* Menghilangkan gap antar elemen */
        }
        
        canvas { display: block; max-width: 100%; height: auto; }

        .text-layer {
            position: absolute; left: 0; top: 0; right: 0; bottom: 0;
            overflow: hidden; opacity: 0.2; line-height: 1.0; pointer-events: none;
        }
        .text-layer span { color: transparent; position: absolute; white-space: pre; transform-origin: 0% 0%; }

        mark.search-highlight { background-color: #fde047; color: black; border-radius: 2px; }
        mark.search-highlight.current { background-color: #f97316; color: white; scale: 1.1; }

        .docx-wrapper { background: white; padding: 50px; max-width: 800px; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 4px; }
        
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

<div id="loading">Memproses...</div>

<header class="app-bar">
    <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-vault"></i></div>
        <div class="logo-text">DocuMind</div>
    </div>
    <div class="search-section">
        <input type="text" id="searchInput" placeholder="Cari dalam dokumen...">
        <span class="match-badge" id="matchStatus">0/0</span>
        <button onclick="changeMatch(-1)" class="btn-icon"><i class="fas fa-chevron-up"></i></button>
        <button onclick="changeMatch(1)" class="btn-icon"><i class="fas fa-chevron-down"></i></button>
    </div>
    <button onclick="document.getElementById('fileInput').click()" style="background:#1e4a6e; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">
        <i class="fas fa-upload"></i> Unggah
    </button>
    <input type="file" id="fileInput" hidden accept=".pdf,.docx">
</header>

<main class="main-content">
    <aside class="sidebar">
        <div class="sidebar-header"><strong>Pustaka</strong></div>
        <div class="file-list" id="fileList"></div>
    </aside>
    <section class="viewer-container" id="viewer"></section>
</main>

<script>
    // --- Register Service Worker for Offline ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(reg => console.log('SW Registered'));
        });
    }

    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let dbFiles = JSON.parse(localStorage.getItem('vault_docs') || '[]');
    let currentMatchIdx = -1;
    let matches = [];

    function renderFileList() {
        const list = document.getElementById('fileList');
        list.innerHTML = dbFiles.map((f, i) => `
            <div class="file-item" onclick="loadFile('${f.id}')">
                <span>${f.name}</span>
                <i class="fas fa-trash" onclick="event.stopPropagation(); deleteFile(${i})" style="color:#ccc"></i>
            </div>
        `).join('');
    }

    async function loadFile(id) {
        const file = dbFiles.find(f => f.id === id);
        const viewer = document.getElementById('viewer');
        const loader = document.getElementById('loading');
        loader.style.display = 'flex';
        viewer.innerHTML = '';
        
        const binary = atob(file.data);
        const bytes = new Uint8Array(binary.length);
        for(let i=0; i<binary.length; i++) bytes[i] = binary.charCodeAt(i);

        if(file.name.endsWith('.pdf')) {
            const pdf = await pdfjs.getDocument({data: bytes.buffer}).promise;
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({scale: 1.5});
                
                const wrapper = document.createElement('div');
                wrapper.className = 'pdf-page-wrapper';
                wrapper.style.width = Math.floor(viewport.width) + 'px';
                
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                wrapper.appendChild(canvas);

                const textDiv = document.createElement('div');
                textDiv.className = 'text-layer';
                wrapper.appendChild(textDiv);
                
                viewer.appendChild(wrapper);
                await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
                const textContent = await page.getTextContent();
                await pdfjs.renderTextLayer({textContent, container: textDiv, viewport, textDivs: []}).promise;
            }
        } else {
            const res = await mammoth.convertToHtml({arrayBuffer: bytes.buffer});
            viewer.innerHTML = `<div class="docx-wrapper">${res.value}</div>`;
        }
        loader.style.display = 'none';
    }

    // --- Pencarian Akurat ---
    document.getElementById('searchInput').oninput = function() {
        const term = this.value.trim().toLowerCase();
        // Reset highlights
        document.querySelectorAll('mark.search-highlight').forEach(m => {
            const txt = m.textContent;
            m.replaceWith(document.createTextNode(txt));
        });
        matches = [];
        
        if(term.length < 2) return;

        const viewer = document.getElementById('viewer');
        const walker = document.createTreeWalker(viewer, NodeFilter.SHOW_TEXT);
        let node;
        const textNodes = [];
        while(node = walker.nextNode()) textNodes.push(node);

        textNodes.forEach(node => {
            const text = node.nodeValue;
            if(text.toLowerCase().includes(term)) {
                const frag = document.createDocumentFragment();
                const parts = text.split(new RegExp(`(${term})`, 'gi'));
                parts.forEach(part => {
                    if(part.toLowerCase() === term) {
                        const m = document.createElement('mark');
                        m.className = 'search-highlight';
                        m.textContent = part;
                        matches.push(m);
                        frag.appendChild(m);
                    } else {
                        frag.appendChild(document.createTextNode(part));
                    }
                });
                node.parentNode.replaceChild(frag, node);
            }
        });
        currentMatchIdx = 0;
        updateMatchStatus();
    };

    function updateMatchStatus() {
        document.getElementById('matchStatus').innerText = matches.length > 0 ? `${currentMatchIdx + 1}/${matches.length}` : '0/0';
        matches.forEach((m, i) => m.classList.toggle('current', i === currentMatchIdx));
        if(matches[currentMatchIdx]) matches[currentMatchIdx].scrollIntoView({behavior:'smooth', block:'center'});
    }

    function changeMatch(dir) {
        if(matches.length === 0) return;
        currentMatchIdx = (currentMatchIdx + dir + matches.length) % matches.length;
        updateMatchStatus();
    }

    document.getElementById('fileInput').onchange = function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function() {
            const base64 = btoa(new Uint8Array(this.result).reduce((data, byte) => data + String.fromCharCode(byte), ''));
            dbFiles.push({ id: Date.now().toString(), name: file.name, data: base64 });
            localStorage.setItem('vault_docs', JSON.stringify(dbFiles));
            renderFileList();
        };
        reader.readAsArrayBuffer(file);
    };

    function deleteFile(i) { dbFiles.splice(i, 1); localStorage.setItem('vault_docs', JSON.stringify(dbFiles)); renderFileList(); }

    renderFileList();
</script>
</body>
</html>
